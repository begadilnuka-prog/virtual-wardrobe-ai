name: virtual_wardrobe_ai
description: Premium Flutter MVP for digital wardrobe planning and AI outfit recommendations.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.6
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  shimmer: ^3.0.0
  uuid: ^4.5.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/clothes/
    - assets/images/marketplace/
